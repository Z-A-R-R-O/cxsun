services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "codexsun_db"
      POSTGRES_USER: "codexsun"
      POSTGRES_PASSWORD: "DbPass1@@"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codexion-network

volumes:
  postgres_data:

networks:
  codexion-network:
    external: true
