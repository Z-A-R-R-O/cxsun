services:
  app:
    build:
      context: ..
      dockerfile: .container/Dockerfile
    image: cxnext-app:${APP_VERSION:-local}
    container_name: cxnext-app
    restart: unless-stopped
    env_file:
      - path: ../.env
        required: false
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_HTTP_PORT: ${APP_HTTP_PORT:-4000}
      AUTH_TOKEN_EXPIRES_SECONDS: ${AUTH_TOKEN_EXPIRES_SECONDS:-86400}
      JWT_SECRET: ${JWT_SECRET:-cxnext-setup-temporary-secret-change-after-install}
      DB_DRIVER: ${DB_DRIVER:-mariadb}
      DB_HOST: ${DB_HOST:-mariadb}
      DB_NAME: ${DB_NAME:-cxnext_db}
      DB_PASSWORD: ${DB_PASSWORD:-DbPass1@@}
      DB_PORT: ${DB_PORT:-3306}
      DB_SSL: ${DB_SSL:-false}
      DB_USER: ${DB_USER:-root}
      DEPLOY_DIR: /deploy/cxnext
      COMPOSE_FILE: ${COMPOSE_FILE:-.container/docker-compose.yml}
      FRONTEND_HTTP_PORT: ${FRONTEND_HTTP_PORT:-3000}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_URL: ${GIT_URL:-https://github.com/sundar-aaran/cxnext.git}
      NODE_ENV: production
      PORT: ${APP_HTTP_PORT:-4000}
      SYSTEM_UPDATE_ENABLED: ${SYSTEM_UPDATE_ENABLED:-true}
      SMOKE_TEST_ENABLED: ${SMOKE_TEST_ENABLED:-false}
      SMOKE_TEST_TIMEOUT_MS: ${SMOKE_TEST_TIMEOUT_MS:-60000}
    ports:
      - "${FRONTEND_PUBLIC_PORT:-3000}:3000"
      - "${APP_PUBLIC_PORT:-4000}:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${DEPLOY_SOURCE:-../}
        target: /deploy/cxnext
    networks:
      - codexion-network

networks:
  codexion-network:
    name: codexion-network
    external: true
